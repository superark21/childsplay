<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>childsplay</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #f5f0eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    /* ── Button shell ── */
    .te-btn {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      font-size: 16px; /* anchors em units used in shadows */
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transform: translateY(0);
      transition: transform 0.1s ease;
    }

    .te-btn:active {
      transform: translateY(2px);
    }

    .te-btn:focus-visible .btn-surface {
      outline: 2px solid hsl(12, 80%, 55%);
      outline-offset: 4px;
    }

    /* ── Button face (carries all the shadow magic) ── */
    .btn-surface {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(145deg, hsla(12, 80%, 62%, 1), hsla(12, 80%, 46%, 1));
      pointer-events: none;

      /* Raised state — 5 layers so transitions interpolate cleanly */
      box-shadow:
        /* outer drop shadows */
         3px  3px  6px -1px rgba(0, 0, 0, 0.35),
         5px  5px 16px -4px rgba(0, 0, 0, 0.28),
        /* top-left specular highlight */
        -2px -2px  5px -1px hsla(12, 100%, 85%, 0.55),
        /* inner rim catch-light */
        inset  1px  1px  2px -1px hsla(12, 100%, 90%, 0.40),
        /* inner rim shadow */
        inset -1px -1px  2px -1px rgba(0, 0, 0, 0.15);

      transition: box-shadow 0.15s ease;
    }

    /* Pressed state — same 5 layers, values from TE reference */
    .te-btn:active .btn-surface {
      background: linear-gradient(145deg, hsla(12, 80%, 46%, 1), hsla(12, 80%, 62%, 1));

      box-shadow:
        /* replace outer drops with transparent placeholders (same count!) */
         0px  0px  0px  0px rgba(0, 0, 0, 0.00),
         0px  0px  0px  0px rgba(0, 0, 0, 0.00),
        /* top-left goes dark on press */
         0px  0px  0px  0px hsla(12, 100%, 85%, 0.00),
        /* TE concavity shadows */
        inset -2px -2px 0.065em -0.05em rgba(0, 0, 0, 0.45),
        inset -5px -5px  1.68em -0.375em rgba(0, 0, 0, 0.70),
        inset  2px  2px  0.25px    -1px hsla(12, 100%, 90%, 0.12),
        inset 23px 23px  1.375em  -0.8em hsla(0, 0%, 100%, 0.20);
    }

    /* ── Grain texture ── */
    .grain {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.08;
      mix-blend-mode: overlay;
      filter: url(#grain-filter);
      background: transparent;
    }
  </style>
</head>
<body>

  <!-- grain SVG filter definition (hidden) -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.65"
          numOctaves="3"
          stitchTiles="stitch"
          result="noise"
        />
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
        <feComposite in="blended" in2="SourceGraphic" operator="in"/>
      </filter>
    </defs>
  </svg>

  <button class="te-btn" aria-label="Button 1">
    <span class="btn-surface"></span>
    <span class="grain"></span>
  </button>

  <button class="te-btn" aria-label="Button 2">
    <span class="btn-surface"></span>
    <span class="grain"></span>
  </button>

  <script>
    document.querySelectorAll('.te-btn').forEach((btn, i) => {
      btn.addEventListener('click', () => {
        console.log(`button ${i + 1} pressed`);
      });
    });
  </script>

</body>
</html>
